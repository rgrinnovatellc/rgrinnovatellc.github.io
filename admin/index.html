<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Content Manager | RGR Innovate LLC</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
      .cms-admin-recovery {
        position: fixed;
        right: 0.85rem;
        bottom: 0.85rem;
        z-index: 9999;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        align-items: center;
        max-width: min(calc(100vw - 1.7rem), 42rem);
        padding: 0.55rem;
        border: 1px solid rgba(23, 106, 143, 0.25);
        border-radius: 0.85rem;
        background: rgba(255, 251, 245, 0.96);
        box-shadow: 0 18px 42px rgba(20, 35, 45, 0.18);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.86rem;
      }

      .cms-admin-recovery a,
      .cms-admin-recovery button {
        min-height: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(45, 63, 74, 0.16);
        border-radius: 0.55rem;
        padding: 0.38rem 0.62rem;
        color: #14232d;
        background: rgba(255, 255, 255, 0.8);
        font: inherit;
        font-weight: 650;
        line-height: 1.1;
        text-decoration: none;
        cursor: pointer;
      }

      .cms-admin-recovery a:hover,
      .cms-admin-recovery button:hover {
        color: #0c4a3e;
        border-color: rgba(18, 101, 84, 0.32);
        background: rgba(18, 101, 84, 0.1);
      }

      @media (prefers-color-scheme: dark) {
        .cms-admin-recovery {
          border-color: rgba(110, 202, 180, 0.24);
          background: rgba(29, 38, 46, 0.96);
          box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        }

        .cms-admin-recovery a,
        .cms-admin-recovery button {
          color: #f3eee5;
          border-color: rgba(226, 232, 233, 0.16);
          background: rgba(38, 48, 57, 0.82);
        }

        .cms-admin-recovery a:hover,
        .cms-admin-recovery button:hover {
          color: #8bdbc6;
          border-color: rgba(110, 202, 180, 0.34);
          background: rgba(110, 202, 180, 0.12);
        }
      }
    </style>
  </head>
  <body>
    <nav class="cms-admin-recovery" aria-label="Admin recovery links">
      <a href="/">Site</a>
      <button type="button" data-cms-reset-login>Reset login</button>
    </nav>

    <script>
      var cmsStorageReady = true;

      try {
        localStorage.setItem("rgr-cms-storage-test", "1");
        localStorage.removeItem("rgr-cms-storage-test");
      } catch (error) {
        cmsStorageReady = false;
        // Decap needs browser storage; keep recovery links available instead.
      }

      function cmsClosestFromEvent(event, selector) {
        var target = event.target;

        if (!target) {
          return null;
        }

        if (target.nodeType !== 1) {
          target = target.parentElement;
        }

        if (!target || typeof target.closest !== "function") {
          return null;
        }

        return target.closest(selector);
      }

      function clearCmsStorage(storageName, prefixes) {
        try {
          var storage = window[storageName];

          for (var index = storage.length - 1; index >= 0; index -= 1) {
            var key = storage.key(index);

            if (!key) {
              continue;
            }

            if (prefixes.some(function(prefix) { return key.indexOf(prefix) === 0; })) {
              storage.removeItem(key);
            }
          }
        } catch (error) {
          // Reload anyway; the CMS will re-check its auth state.
        }
      }

      document.addEventListener("click", function(event) {
        if (!cmsClosestFromEvent(event, "[data-cms-reset-login]")) {
          return;
        }

        clearCmsStorage("localStorage", ["decap-cms", "netlify-cms"]);
        clearCmsStorage("sessionStorage", ["decap-cms", "netlify-cms"]);

        window.location.href = "/admin/";
      });

      if (cmsStorageReady) {
        var cmsScript = document.createElement("script");
        cmsScript.src = "https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js";
        cmsScript.integrity = "sha384-Vwwn7nyPZTJRhuncX5Dci57xwjBjzTzQLSJefKuvOaT3x952fh4vT96UuHDi34zb";
        cmsScript.crossOrigin = "anonymous";
        cmsScript.referrerPolicy = "no-referrer";
        cmsScript.onload = function() {
          if (window.CMS) {
            CMS.registerPreviewStyle("/assets/main.css");
          }
        };
        document.body.appendChild(cmsScript);
      }
    </script>
  </body>
</html>

# Decap CMS configuration for the public GitHub Pages site.
# This file is public. Do not put GitHub tokens, OAuth client secrets, API keys,
# passwords, or private endpoints here.

backend:
  name: github
  repo: rgrinnovatellc/rgrinnovatellc.github.io
  branch: master
  use_graphql: true
  commit_messages:
    create: "cms: create {{collection}} {{slug}}"
    update: "cms: update {{collection}} {{slug}}"
    delete: "cms: delete {{collection}} {{slug}}"
    uploadMedia: "cms: upload {{path}}"
    deleteMedia: "cms: delete media {{path}}"
  # GitHub OAuth requires a server-side helper. For GitHub Pages, deploy an
  # OAuth proxy or use Netlify Identity/Git Gateway, then configure only its
  # public URL here. The OAuth client secret belongs in that service, never here.
  # base_url: https://cms-auth.example.com
  # auth_endpoint: auth

publish_mode: editorial_workflow
# Enable this only when intentionally running a local Decap proxy server.
# local_backend: true
site_url: https://rgrinnovatellc.github.io
display_url: https://rgrinnovatellc.github.io
logo:
  src: /favicon.svg
  show_in_header: true

media_folder: "images/uploads"
public_folder: "/images/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "posts"
    label: "Blog Post Wrappers"
    label_singular: "Blog Post Wrapper"
    description: "Jekyll post metadata and wrapper body. Most existing posts include article HTML from _includes/blogs_html."
    folder: "_posts"
    create: true
    delete: false
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["date", "title", "layout"]
    view_groups:
      - label: "Year"
        field: "date"
        pattern: "\\d{4}"
      - label: "Layout"
        field: "layout"
    fields:
      - label: "Layout"
        name: "layout"
        widget: "select"
        options: ["post", "default", "page"]
        default: "post"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        required: false
        hint: "Existing posts infer this from the YYYY-MM-DD filename when the field is omitted."
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Author"
        name: "author"
        widget: "string"
        required: false
      - label: "Categories"
        name: "categories"
        widget: "list"
        required: false
        collapsed: true
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        collapsed: true
      - label: "Body"
        name: "body"
        widget: "code"
        default_language: "html"
        output_code_only: true
        required: false
        hint: "Use Markdown or Liquid. Existing articles usually contain one include tag pointing at _includes/blogs_html."

  - name: "blog_html"
    label: "Blog Article HTML"
    label_singular: "Blog Article HTML"
    description: "Raw article HTML included by blog post wrappers."
    identifier_field: "body"
    folder: "_includes/blogs_html"
    create: false
    delete: false
    extension: "html"
    format: "yaml-frontmatter"
    frontmatter_delimiter: ["<!--", "-->"]
    slug: "{{slug}}"
    summary: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "hidden"
        required: false
      - label: "HTML Body"
        name: "body"
        widget: "code"
        default_language: "html"
        output_code_only: true
        required: false
        hint: "Edit the included article markup. Keep Liquid and HTML balanced before publishing."

  - name: "pages"
    label: "Site Pages"
    label_singular: "Site Page"
    description: "Top-level Jekyll pages from _pages."
    folder: "_pages"
    create: false
    delete: false
    extension: "html"
    format: "yaml-frontmatter"
    summary: "{{title}}"
    sortable_fields: ["title", "permalink", "layout"]
    fields:
      - label: "Layout"
        name: "layout"
        widget: "select"
        options: ["gridlay", "textlay", "page", "default", "research", "publications", "team", "piclay"]
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Permalink"
        name: "permalink"
        widget: "string"
        required: false
      - label: "Sitemap"
        name: "sitemap"
        widget: "boolean"
        required: false
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Keywords"
        name: "keywords"
        widget: "string"
        required: false
      - label: "Share Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Noindex"
        name: "noindex"
        widget: "boolean"
        required: false
      - label: "Last Modified"
        name: "last_modified_at"
        widget: "datetime"
        required: false
      - label: "Page Body"
        name: "body"
        widget: "code"
        default_language: "html"
        output_code_only: true
        required: false
        hint: "This site uses Liquid and HTML in pages. Edit carefully and run a Jekyll build before pushing."
